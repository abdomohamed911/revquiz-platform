services:
  mongodb:
    image: mongo:7
    container_name: revquiz-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: revquiz

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: revquiz-server
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_URL: mongodb://mongodb:27017
      DB_NAME: revquiz
      JWT_SECRET: dev-secret-change-in-production-min-32-chars
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: development
    depends_on:
      - mongodb
    volumes:
      - ./server/src:/app/src

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: revquiz-client
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  mongo-data:
