services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: revquiz-server
    ports:
      - "8080:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
    restart: unless-stopped
